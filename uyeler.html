<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üyeler — gunde5.com</title>
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="description" content="Gunde5 üye yönetimi (yönetici).">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#6d28d9">
    <style>
        :root {
            --bg-main: #f7f7f7;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --header-bg: #ffffff;
            --female-color: #db2777;
            --female-bg: #fff1f2;
            --female-border: #fecdd3;
            --male-color: #2563eb;
            --male-bg: #eff6ff;
            --male-border: #bfdbfe;
        }
        body.dark-mode {
            --bg-main: #0f1419;
            --bg-card: #0b0f14;
            --text-main: #e7e9ea;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.10);
            --header-bg: #161a1e;
            --female-color: #f43f5e;
            --female-bg: #201319;
            --female-border: #4c1d24;
            --male-color: #1d9bf0;
            --male-bg: #0e1924;
            --male-border: #1d354b;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 24px;
            transition: background-color 0.2s, color 0.2s;
        }
        header {
            background-color: #1d9bf0;
            color: #ffffff;
            padding: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            border-bottom: 1px solid #1a8cd8;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-brand {
            color: #ffffff;
            text-decoration: none;
        }
        .header-brand:hover { opacity: 0.92; }
        .header-brand-red { color: #ef4444; }
        header .header-auth-btn {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.45);
            color: #ffffff;
        }
        .header-sol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 110;
        }
        .header-sag {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 110;
        }
        .header-menu-wrap { position: relative; }
        .header-menu-btn {
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0;
        }
        .header-menu-bar {
            display: block;
            width: 18px;
            height: 2px;
            background: #ffffff;
            border-radius: 1px;
        }
        .header-menu-panel {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            min-width: 168px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            padding: 8px;
            z-index: 200;
        }
        body.dark-mode .header-menu-panel {
            background: var(--bg-card);
            border-color: var(--border-color);
        }
        .header-menu-nav { display: flex; flex-direction: column; gap: 2px; }
        .header-auth-btns { display: flex; align-items: center; gap: 8px; }
        .header-auth-btns[hidden] { display: none !important; }
        .header-menu-link {
            display: block;
            padding: 10px 12px;
            border-radius: 10px;
            color: #111827;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-align: left;
            border: none;
            background: transparent;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
        }
        body.dark-mode .header-menu-link { color: var(--text-main); }
        .header-menu-link:hover { background: #f3f4f6; }
        body.dark-mode .header-menu-link:hover { background: #2f3336; }
        .header-auth-btn {
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }
        .header-auth-btn--giris {
            background: #ffffff;
            color: #1d9bf0;
            border-color: #ffffff;
        }
        .header-profil-link {
            display: none;
            align-items: center;
            padding: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.45);
            text-decoration: none;
        }
        .header-profil-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            flex-shrink: 0;
        }
        .header-profil-link.cins-female .header-profil-avatar:not(.has-foto) { background-color: var(--female-color); }
        .header-profil-link.cins-male .header-profil-avatar:not(.has-foto) { background-color: var(--male-color); }
        .header-profil-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .header-profil-avatar.has-foto {
            background: transparent !important;
            overflow: hidden;
        }
        .auth-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2100;
            background: rgba(17, 24, 39, 0.32);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .auth-overlay.acik { display: flex; }
        .auth-modal-panel {
            --auth-accent: #2563eb;
            --auth-accent-border: #93c5fd;
            position: relative;
            width: 100%;
            max-width: 400px;
            max-height: 92vh;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 28px 22px 22px;
        }
        body.dark-mode .auth-modal-panel {
            background: var(--bg-card);
            border-color: var(--border-color);
        }
        .auth-modal-panel.cins-female {
            --auth-accent: var(--female-color);
            --auth-accent-border: var(--female-border);
            border-color: var(--female-border);
        }
        .auth-modal-panel.cins-male {
            --auth-accent: var(--male-color);
            --auth-accent-border: var(--male-border);
            border-color: var(--male-border);
        }
        .auth-modal-kapat {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            padding: 0;
            border: 1px solid #e5e7eb;
            border-radius: 50%;
            background: #f9fafb;
            color: #374151;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }
        body.dark-mode .auth-modal-kapat {
            background: var(--bg-main);
            border-color: var(--border-color);
            color: var(--text-muted);
        }
        .auth-brand { text-align: center; margin-bottom: 22px; padding-top: 4px; }
        .auth-brand-text {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #111827;
        }
        .auth-brand-text span { color: #ef4444; }
        body.dark-mode .auth-brand-text { color: var(--text-main); }
        .auth-modal-baslik {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 4px;
            text-align: center;
            color: var(--text-main);
        }
        .auth-modal-alt-baslik {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 18px;
            text-align: center;
        }
        .auth-etiket {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .auth-input,
        .auth-select {
            display: block;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1.5px solid var(--auth-accent-border);
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 500;
            outline: none;
        }
        body.dark-mode .auth-input,
        body.dark-mode .auth-select { background: var(--bg-main); }
        .auth-input:focus,
        .auth-select:focus {
            border-color: var(--auth-accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        .auth-cins-satir { display: flex; gap: 12px; margin-bottom: 20px; }
        .auth-cins-btn {
            flex: 1;
            padding: 12px 8px;
            border: 1.5px solid var(--auth-accent-border);
            border-radius: 12px;
            background: #ffffff;
            font-size: 12px;
            font-weight: 800;
            color: #6b7280;
            cursor: pointer;
        }
        body.dark-mode .auth-cins-btn { background: var(--bg-main); }
        .auth-cins-btn.secili-female {
            border-color: var(--female-color);
            background: var(--female-bg);
            color: var(--female-color);
        }
        .auth-cins-btn.secili-male {
            border-color: var(--male-color);
            background: var(--male-bg);
            color: var(--male-color);
        }
        .auth-kvkk {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 18px;
            font-size: 11px;
            line-height: 1.5;
            color: #6b7280;
            font-weight: 500;
        }
        .auth-kvkk input {
            margin-top: 3px;
            flex-shrink: 0;
            accent-color: var(--auth-accent);
        }
        .auth-kvkk a {
            color: var(--auth-accent);
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .auth-submit {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: var(--auth-accent);
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .auth-modal-panel.cins-female .auth-submit--kayit { background: var(--female-color); }
        .auth-modal-panel.cins-male .auth-submit--kayit { background: var(--male-color); }
        .auth-gecis {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
        }
        .auth-gecis button {
            border: none;
            background: none;
            padding: 0;
            font-size: 13px;
            font-weight: 700;
            color: var(--auth-accent);
            cursor: pointer;
        }
        .auth-view { display: none; }
        .auth-view.aktif { display: block; }
        .gunde5-toast {
            display: none;
            position: fixed;
            left: 50%;
            top: 50%;
            right: auto;
            bottom: auto;
            transform: translate(-50%, -50%);
            width: calc(100% - 32px);
            max-width: 400px;
            margin: 0;
            padding: 12px 16px;
            border-radius: 14px;
            background: #111827;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            z-index: 3500;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
        }
        .gunde5-toast--hata { background: #991b1b; }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 18px 16px 28px;
        }
        .page-title {
            font-size: 22px;
            margin: 10px 0 12px;
            letter-spacing: -0.02em;
            text-align: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 14px;
            margin: 12px 0;
        }
        .card h2 {
            font-size: 15px;
            margin: 0 0 8px;
        }
        .card p {
            margin: 0 0 10px;
            color: var(--text-muted);
            line-height: 1.55;
            font-size: 13.5px;
            font-weight: 600;
        }
        .card p:last-child { margin-bottom: 0; }
        .intro {
            margin: 0 0 16px;
            color: var(--text-main);
            line-height: 1.6;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
        .intro a {
            color: inherit;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
        }
        .accordion {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .accordion-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
        }
        .accordion-item[open] {
            border-color: rgba(37, 99, 235, 0.25);
        }
        body.dark-mode .accordion-item[open] {
            border-color: rgba(96, 165, 250, 0.3);
        }
        .accordion-item summary {
            list-style: none;
            cursor: pointer;
            padding: 14px 14px 14px 16px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            user-select: none;
        }
        .accordion-item summary::-webkit-details-marker { display: none; }
        .accordion-item summary::after {
            content: '+';
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            transition: transform 0.2s ease;
        }
        body.dark-mode .accordion-item summary::after {
            background: rgba(255, 255, 255, 0.06);
        }
        .accordion-item[open] summary::after {
            content: '−';
            transform: rotate(180deg);
        }
        .accordion-body {
            padding: 0 16px 14px;
            color: var(--text-muted);
            line-height: 1.55;
            font-size: 16px;
            font-weight: 600;
        }
        .accordion-body p { margin: 0; }
        .accordion-body a {
            color: inherit;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
            font-weight: 700;
        }
    </style>
    <script src="js/gunde5-shell.js"></script>
    <script defer src="js/gunde5-perf.js"></script>
    <script src="js/gunde5-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/gunde5-profil.js"></script>
    <script src="js/gunde5-ui.js"></script>
    <script src="js/gunde5-db.js"></script>
    <script src="js/gunde5-paylas.js"></script>
    <script src="js/gunde5-bildirim.js"></script>
    <script src="js/gunde5-master-uyeler.js"></script>
    <link rel="stylesheet" href="css/gunde5-topbar.css?v=1">
</head>
<body>
    <header>
        <div class="header-sol">
            <div class="header-menu-wrap">
                <button type="button" class="header-menu-btn" id="headerMenuBtn" aria-label="Menü" aria-expanded="false" aria-controls="headerMenuPanel" onclick="Gunde5UI.toggleHeaderMenu(event)">
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                </button>
                <div class="header-menu-panel" id="headerMenuPanel" hidden>
                    <nav class="header-menu-nav" aria-label="Site menüsü"></nav>
                </div>
            </div>
        </div>
        <a href="/" class="header-brand">gunde<span class="header-brand-red">5</span>.com</a>
        <div class="header-sag">
            <a href="/profil" class="header-profil-link" id="headerProfilLink" aria-label="Profilim">
                <span class="header-profil-avatar" id="headerProfilAvatar">♀</span>
            </a>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">👥 Üyeler</h1>
        <p class="intro">Tüm üye bilgileri, düzenleme ve hesap işlemleri — yalnızca site yöneticisi.</p>

        <div id="uyelerYetkisiz" class="uyeler-yetkisiz" hidden>
            <p class="uyeler-yetkisiz-metin"></p>
            <button type="button" class="istat-giris-btn" id="uyelerGirisBtn" hidden>Giriş yap</button>
        </div>

        <div id="uyelerFiltre" class="uyeler-filtre" hidden>
            <div class="uyeler-ara">
                <input type="search" id="uyelerAra" placeholder="Rumuz veya e-posta ara…" autocomplete="off">
                <button type="button" class="uyeler-ara-btn" id="uyelerAraBtn">Ara</button>
            </div>
            <button type="button" class="uyeler-filtre-btn uyeler-filtre-btn--aktif" data-uyeler-durum="" aria-pressed="true">Tümü</button>
            <button type="button" class="uyeler-filtre-btn" data-uyeler-durum="aktif" aria-pressed="false">Aktif</button>
            <button type="button" class="uyeler-filtre-btn" data-uyeler-durum="askida" aria-pressed="false">Askıda</button>
            <button type="button" class="uyeler-filtre-btn" data-uyeler-durum="ban" aria-pressed="false">Banlı</button>
        </div>

        <div id="uyelerApp" hidden>
            <p id="uyelerOzet" class="uyeler-ozet"></p>
            <p id="uyelerYukleniyor" class="istat-yukleniyor" hidden>Yükleniyor…</p>
            <div id="uyelerListe"></div>
            <div class="uyeler-sayfalama">
                <button type="button" class="uyeler-sayfa-btn" id="uyelerOnceki">← Önceki</button>
                <button type="button" class="uyeler-sayfa-btn" id="uyelerSonraki">Sonraki →</button>
            </div>
        </div>
    </div>

    <div id="uyelerDetayModal" class="uyeler-modal" hidden role="dialog" aria-modal="true" aria-labelledby="uyelerDetayBaslik">
        <div class="uyeler-modal-panel">
            <div class="uyeler-modal-baslik">
                <h2 id="uyelerDetayBaslik">Üye</h2>
                <button type="button" class="uyeler-modal-kapat" id="uyelerDetayKapat" aria-label="Kapat">×</button>
            </div>
            <div id="uyelerDetayGovde"></div>
        </div>
    </div>

    <script>
        function guncelleHeaderOturum() {
            Gunde5UI.guncelleHeaderOturum();
        }

    </script>
</body>
</html>
