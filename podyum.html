<body data-user-gender="male">

    <div class="ss-watermark">gunde5.com</div>

    <header>
        <div class="header-sol">
            <div class="header-menu-wrap">
                <button type="button" class="header-menu-btn" id="headerMenuBtn" aria-label="Menü" aria-expanded="false" aria-controls="headerMenuPanel" onclick="Gunde5UI.toggleHeaderMenu(event)">
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                </button>
                <div class="header-menu-panel" id="headerMenuPanel" hidden>
                    <nav class="header-menu-nav" aria-label="Site menüsü"></nav>
                </div>
            </div>
        </div>
        <a href="/" class="header-brand">gunde<span class="header-brand-red">5</span>.com</a>
        <div class="header-sag">
            <a href="/profil" class="header-profil-link" id="headerProfilLink" aria-label="Profilim">
                <span class="header-profil-avatar" id="headerProfilAvatar">♀</span>
            </a>
        </div>
    </header>

    <div class="container">
        <h1 class="seo-sr-only">gunde5.com — Günün en iyi 5 hikayesi podyumu</h1>

        <div class="info-banner">
            <h4>EFSANELER</h4>
            <p>Günün en çok konuşulan hikayeleri burada — arşiv kalıcı.</p>
        </div>

        <section class="podyum-sampiyonlar" id="podyumSampiyonlar" hidden aria-labelledby="podyumTopEtiket podyumDonemBaslik">
            <header class="podyum-sampiyonlar-banner">
                <span class="podyum-sampiyonlar-trophy" aria-hidden="true">🏆</span>
                <div class="podyum-sampiyonlar-metin">
                    <p class="podyum-sampiyonlar-etiket" id="podyumTopEtiket">EFSANELER</p>
                    <h2 class="podyum-sampiyonlar-baslik" id="podyumDonemBaslik"></h2>
                </div>
            </header>
            <div id="podyumListe" class="podyum-sampiyonlar-liste"></div>
        </section>

    </div>
    <script defer src="js/gunde5-paylas.js"></script>
    <script defer src="js/gunde5-bildirim.js"></script>
    <script defer src="js/gunde5-ara.js"></script>
    <script defer src="js/gunde5-goruntulenme.js"></script>
    <script defer src="js/gunde5-perf.js"></script>
    <script>
        function guncelleHeaderOturum() {
            Gunde5UI.guncelleHeaderOturum();
        }

        function expandCard(cardId) {
            if (Gunde5KartCevap) Gunde5KartCevap.toggle(cardId, false);
        }

        async function vote(cardId, score) {
            if (!Gunde5UI.uyeGirisUyarisi('Oy vermek için yönetici oturumu gerekir.')) {
                return;
            }
            var card = document.querySelector('.card[data-id="' + cardId + '"]');
            var tip = score === 1 ? 'up' : 'down';
            if (Gunde5DB.oyDurumuOku && Gunde5DB.oyDurumuOku(cardId)) {
                if (card) Gunde5UI.kartOyDurumuRenklendir(card, Gunde5DB.oyDurumuOku(cardId));
                Gunde5UI.showToast('Bu hikayeyi zaten oylamıştın, sonrakine geç dostum', 'hata');
                return;
            }
            try {
                var sonuc = await Gunde5DB.oyVer(cardId, score);
                if (card && sonuc) {
                    Gunde5UI.kartOyArayuzunuGuncelle(card, sonuc);
                    if (Gunde5DB.oyDurumuKaydet) Gunde5DB.oyDurumuKaydet(cardId, sonuc.oy != null ? sonuc.oy : score);
                    if (sonuc.zaten_oyladin) {
                        Gunde5UI.showToast('Bu hikayeyi zaten oylamıştın, sonrakine geç dostum', 'hata');
                    }
                }
            } catch (err) {
                var mesaj = Gunde5DB.hataMesaji(err);
                if (mesaj && /zaten oylad|zaten_oylad/i.test(mesaj)) {
                    var gercek = Gunde5DB.oyDurumuSunucudan
                        ? await Gunde5DB.oyDurumuSunucudan(cardId)
                        : null;
                    if (card) Gunde5UI.kartOyDurumuRenklendir(card, gercek || tip);
                    Gunde5UI.showToast('Bu hikayeyi zaten oylamıştın, sonrakine geç dostum', 'hata');
                } else {
                    if (card) Gunde5UI.kartOyDurumuRenklendir(card, null);
                    Gunde5UI.showToast(mesaj, 'hata');
                }
            }
        }

        function baslatPodyumSayfa() {
            if (!window.Gunde5UI || !window.Gunde5DB) return;
            var podyumHazir = (Gunde5PodyumLazy && Gunde5PodyumLazy.init)
                ? Gunde5PodyumLazy.init('podyumListe')
                : Gunde5DB.yuklePodyumListe('podyumListe');
            Gunde5DB.init().then(function () {
                guncelleHeaderOturum();
                return podyumHazir;
            }).then(function () {
                if (!Gunde5Paylas) return;
                return Gunde5Paylas.paylasLinkiKontrolEt('podyum').then(function (devam) {
                    if (devam === false) return;
                    return Gunde5Paylas.isleDerinBaglanti('podyum');
                });
            }).catch(function (err) {
                var el = document.getElementById('podyumListe');
                if (el) el.innerHTML = Gunde5UI.bosListe(Gunde5DB.hataMesaji(err));
                Gunde5UI.showToast(Gunde5DB.hataMesaji(err), 'hata');
            });
        }

        document.addEventListener('DOMContentLoaded', baslatPodyumSayfa);
    </script>
