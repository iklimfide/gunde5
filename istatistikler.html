<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstatistikler — gunde5.com</title>
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="description" content="Gunde5 site istatistikleri (yönetici).">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#1d9bf0">
    <style>
        :root {
            --bg-main: #f7f7f7;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --header-bg: #ffffff;
            --female-color: #db2777;
            --female-bg: #fff1f2;
            --female-border: #fecdd3;
            --male-color: #2563eb;
            --male-bg: #eff6ff;
            --male-border: #bfdbfe;
        }
        body.dark-mode {
            --bg-main: #0f1419;
            --bg-card: #0b0f14;
            --text-main: #e7e9ea;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.10);
            --header-bg: #161a1e;
            --female-color: #f43f5e;
            --female-bg: #201319;
            --female-border: #4c1d24;
            --male-color: #1d9bf0;
            --male-bg: #0e1924;
            --male-border: #1d354b;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 24px;
            transition: background-color 0.2s, color 0.2s;
        }
        header {
            background-color: #1d9bf0;
            color: #ffffff;
            padding: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            border-bottom: 1px solid #1a8cd8;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-brand {
            color: #ffffff;
            text-decoration: none;
        }
        .header-brand:hover { opacity: 0.92; }
        .header-brand-red { color: #ef4444; }
        header .header-auth-btn {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.45);
            color: #ffffff;
        }
        .header-sol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 110;
        }
        .header-sag {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 110;
        }
        .header-menu-wrap { position: relative; }
        .header-menu-btn {
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0;
        }
        .header-menu-bar {
            display: block;
            width: 18px;
            height: 2px;
            background: #ffffff;
            border-radius: 1px;
        }
        .header-menu-panel {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            min-width: 168px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            padding: 8px;
            z-index: 200;
        }
        body.dark-mode .header-menu-panel {
            background: var(--bg-card);
            border-color: var(--border-color);
        }
        .header-menu-nav { display: flex; flex-direction: column; gap: 2px; }
        .header-auth-btns { display: flex; align-items: center; gap: 8px; }
        .header-auth-btns[hidden] { display: none !important; }
        .header-menu-link {
            display: block;
            padding: 10px 12px;
            border-radius: 10px;
            color: #111827;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-align: left;
            border: none;
            background: transparent;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
        }
        body.dark-mode .header-menu-link { color: var(--text-main); }
        .header-menu-link:hover { background: #f3f4f6; }
        body.dark-mode .header-menu-link:hover { background: #2f3336; }
        .header-auth-btn {
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }
        .header-auth-btn--giris {
            background: #ffffff;
            color: #1d9bf0;
            border-color: #ffffff;
        }
        .header-profil-link {
            display: none;
            align-items: center;
            padding: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.45);
            text-decoration: none;
        }
        .header-profil-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            flex-shrink: 0;
        }
        .header-profil-link.cins-female .header-profil-avatar:not(.has-foto) { background-color: var(--female-color); }
        .header-profil-link.cins-male .header-profil-avatar:not(.has-foto) { background-color: var(--male-color); }
        .header-profil-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .header-profil-avatar.has-foto {
            background: transparent !important;
            overflow: hidden;
        }
        .auth-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2100;
            background: rgba(17, 24, 39, 0.32);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .auth-overlay.acik { display: flex; }
        .auth-modal-panel {
            --auth-accent: #2563eb;
            --auth-accent-border: #93c5fd;
            position: relative;
            width: 100%;
            max-width: 400px;
            max-height: 92vh;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 28px 22px 22px;
        }
        body.dark-mode .auth-modal-panel {
            background: var(--bg-card);
            border-color: var(--border-color);
        }
        .auth-modal-panel.cins-female {
            --auth-accent: var(--female-color);
            --auth-accent-border: var(--female-border);
            border-color: var(--female-border);
        }
        .auth-modal-panel.cins-male {
            --auth-accent: var(--male-color);
            --auth-accent-border: var(--male-border);
            border-color: var(--male-border);
        }
        .auth-modal-kapat {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            padding: 0;
            border: 1px solid #e5e7eb;
            border-radius: 50%;
            background: #f9fafb;
            color: #374151;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }
        body.dark-mode .auth-modal-kapat {
            background: var(--bg-main);
            border-color: var(--border-color);
            color: var(--text-muted);
        }
        .auth-brand { text-align: center; margin-bottom: 22px; padding-top: 4px; }
        .auth-brand-text {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #111827;
        }
        .auth-brand-text span { color: #ef4444; }
        body.dark-mode .auth-brand-text { color: var(--text-main); }
        .auth-modal-baslik {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 4px;
            text-align: center;
            color: var(--text-main);
        }
        .auth-modal-alt-baslik {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 18px;
            text-align: center;
        }
        .auth-etiket {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .auth-input,
        .auth-select {
            display: block;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1.5px solid var(--auth-accent-border);
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 500;
            outline: none;
        }
        body.dark-mode .auth-input,
        body.dark-mode .auth-select { background: var(--bg-main); }
        .auth-input:focus,
        .auth-select:focus {
            border-color: var(--auth-accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        .auth-cins-satir { display: flex; gap: 12px; margin-bottom: 20px; }
        .auth-cins-btn {
            flex: 1;
            padding: 12px 8px;
            border: 1.5px solid var(--auth-accent-border);
            border-radius: 12px;
            background: #ffffff;
            font-size: 12px;
            font-weight: 800;
            color: #6b7280;
            cursor: pointer;
        }
        body.dark-mode .auth-cins-btn { background: var(--bg-main); }
        .auth-cins-btn.secili-female {
            border-color: var(--female-color);
            background: var(--female-bg);
            color: var(--female-color);
        }
        .auth-cins-btn.secili-male {
            border-color: var(--male-color);
            background: var(--male-bg);
            color: var(--male-color);
        }
        .auth-kvkk {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 18px;
            font-size: 11px;
            line-height: 1.5;
            color: #6b7280;
            font-weight: 500;
        }
        .auth-kvkk input {
            margin-top: 3px;
            flex-shrink: 0;
            accent-color: var(--auth-accent);
        }
        .auth-kvkk a {
            color: var(--auth-accent);
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .auth-submit {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: var(--auth-accent);
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .auth-modal-panel.cins-female .auth-submit--kayit { background: var(--female-color); }
        .auth-modal-panel.cins-male .auth-submit--kayit { background: var(--male-color); }
        .auth-gecis {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
        }
        .auth-gecis button {
            border: none;
            background: none;
            padding: 0;
            font-size: 13px;
            font-weight: 700;
            color: var(--auth-accent);
            cursor: pointer;
        }
        .auth-view { display: none; }
        .auth-view.aktif { display: block; }
        .gunde5-toast {
            display: none;
            position: fixed;
            left: 50%;
            top: 50%;
            right: auto;
            bottom: auto;
            transform: translate(-50%, -50%);
            width: calc(100% - 32px);
            max-width: 400px;
            margin: 0;
            padding: 12px 16px;
            border-radius: 14px;
            background: #111827;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            z-index: 3500;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
        }
        .gunde5-toast--hata { background: #991b1b; }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 18px 16px 28px;
        }
        .page-title {
            font-size: 22px;
            margin: 10px 0 12px;
            letter-spacing: -0.02em;
            text-align: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 14px;
            margin: 12px 0;
        }
        .card h2 {
            font-size: 15px;
            margin: 0 0 8px;
        }
        .card p {
            margin: 0 0 10px;
            color: var(--text-muted);
            line-height: 1.55;
            font-size: 13.5px;
            font-weight: 600;
        }
        .card p:last-child { margin-bottom: 0; }
        .intro {
            margin: 0 0 16px;
            color: var(--text-main);
            line-height: 1.6;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
        .intro a {
            color: inherit;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
        }
        .accordion {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .accordion-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
        }
        .accordion-item[open] {
            border-color: rgba(37, 99, 235, 0.25);
        }
        body.dark-mode .accordion-item[open] {
            border-color: rgba(96, 165, 250, 0.3);
        }
        .accordion-item summary {
            list-style: none;
            cursor: pointer;
            padding: 14px 14px 14px 16px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            user-select: none;
        }
        .accordion-item summary::-webkit-details-marker { display: none; }
        .accordion-item summary::after {
            content: '+';
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            transition: transform 0.2s ease;
        }
        body.dark-mode .accordion-item summary::after {
            background: rgba(255, 255, 255, 0.06);
        }
        .accordion-item[open] summary::after {
            content: '−';
            transform: rotate(180deg);
        }
        .accordion-body {
            padding: 0 16px 14px;
            color: var(--text-muted);
            line-height: 1.55;
            font-size: 16px;
            font-weight: 600;
        }
        .accordion-body p { margin: 0; }
        .accordion-body a {
            color: inherit;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
            font-weight: 700;
        }
        .istat-filtre {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin: 0 0 16px;
        }
        .istat-filtre--haric {
            margin-top: -8px;
            margin-bottom: 14px;
        }
        .istat-filtre-etiket {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            margin-right: 2px;
        }
        .istat-filtre-not {
            font-weight: 700;
            color: var(--text-main);
        }
        .istat-gun-btn {
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .istat-gun-btn--aktif {
            background: #1d9bf0;
            border-color: #1d9bf0;
            color: #ffffff;
        }
        .istat-yenile-btn {
            border: 1px dashed var(--border-color);
            background: transparent;
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .istat-yukleniyor {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            padding: 24px 0;
        }
        .istat-yetkisiz {
            text-align: center;
            padding: 32px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }
        .istat-yetkisiz-metin {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .istat-giris-btn {
            border: none;
            background: #1d9bf0;
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }
        .istat-donem-notu {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 0 0 14px;
        }
        .istat-bolum { margin-bottom: 22px; }
        .istat-bolum-baslik {
            font-size: 14px;
            font-weight: 900;
            margin: 0 0 10px;
            letter-spacing: -0.02em;
        }
        .istat-kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .istat-kpi {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .istat-kpi-etiket {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
        }
        .istat-kpi-deger {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
        }
        .istat-kpi-alt {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            line-height: 1.35;
        }
        .istat-bolum-not {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin: -4px 0 10px;
            line-height: 1.45;
        }
        .istat-bolum--hero {
            background: linear-gradient(165deg, rgba(29, 155, 240, 0.08), rgba(29, 155, 240, 0.02));
            border: 1px solid rgba(29, 155, 240, 0.18);
            border-radius: 16px;
            padding: 14px 12px 12px;
        }
        body.dark-mode .istat-bolum--hero {
            background: linear-gradient(165deg, rgba(29, 155, 240, 0.14), rgba(29, 155, 240, 0.04));
            border-color: rgba(96, 165, 250, 0.22);
        }
        .istat-kpi-grid--hero {
            grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
        }
        .istat-kpi-grid--hero .istat-kpi-deger {
            font-size: 18px;
        }
        .istat-detay {
            margin: 18px 0;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-card);
            overflow: hidden;
        }
        .istat-detay summary {
            cursor: pointer;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 800;
            list-style: none;
        }
        .istat-detay summary::-webkit-details-marker { display: none; }
        .istat-detay[open] summary {
            border-bottom: 1px solid var(--border-color);
        }
        .istat-detay > .istat-kpi-grid,
        .istat-detay > .istat-bolum {
            padding: 0 12px 12px;
        }
        .istat-detay .istat-bolum-baslik {
            margin-top: 12px;
        }
        .istat-tablo-wrap {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
            -webkit-overflow-scrolling: touch;
        }
        .istat-tablo-wrap .istat-tablo { min-width: 640px; }
        .istat-matris-wrap .istat-matris { min-width: 480px; }
        .istat-matris .istat-matris-kose,
        .istat-matris .istat-matris-hikaye {
            text-align: left;
            min-width: 140px;
            max-width: 200px;
            font-weight: 700;
            position: sticky;
            left: 0;
            background: var(--bg-card);
            z-index: 1;
        }
        .istat-matris .istat-matris-gun,
        .istat-matris .istat-matris-sayi {
            text-align: center;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .istat-matris .istat-matris-gun {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.02em;
        }
        .istat-matris .istat-matris-sayi.istat-matris-bos {
            color: var(--text-muted);
            opacity: 0.45;
        }
        .istat-matris .istat-matris-sayi.istat-matris-dolu {
            font-weight: 800;
        }
        .istat-matris .istat-matris-toplam,
        .istat-matris .istat-matris-toplam-hucre {
            font-weight: 800;
            background: rgba(29, 155, 240, 0.06);
        }
        body.dark-mode .istat-matris .istat-matris-toplam,
        body.dark-mode .istat-matris .istat-matris-toplam-hucre {
            background: rgba(29, 155, 240, 0.12);
        }
        .istat-tablo {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .istat-tablo th,
        .istat-tablo td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }
        .istat-tablo th {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
