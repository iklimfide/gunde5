<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrikler — gunde5.com</title>
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="description" content="Gunde5 site içi metrikleri (yönetici).">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#1d9bf0">
    <style>
        :root {
            --bg-main: #f7f7f7;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --header-bg: #ffffff;
            --female-color: #db2777;
            --female-bg: #fff1f2;
            --female-border: #fecdd3;
            --male-color: #2563eb;
            --male-bg: #eff6ff;
            --male-border: #bfdbfe;
        }
        body.dark-mode {
            --bg-main: #0f1419;
            --bg-card: #0b0f14;
            --text-main: #e7e9ea;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.10);
            --header-bg: #161a1e;
            --female-color: #f43f5e;
            --female-bg: #201319;
            --female-border: #4c1d24;
            --male-color: #1d9bf0;
            --male-bg: #0e1924;
            --male-border: #1d354b;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 92px;
            transition: background-color 0.2s, color 0.2s;
        }
        header {
            background-color: #1d9bf0;
            color: #ffffff;
            padding: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            border-bottom: 1px solid #1a8cd8;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-brand {
            color: #ffffff;
            text-decoration: none;
        }
        .header-brand:hover { opacity: 0.92; }
        .header-brand-red { color: #ef4444; }
        header .header-auth-btn {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.45);
            color: #ffffff;
        }
        .header-sol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 110;
        }
        .header-sag {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 110;
        }
        .header-menu-wrap { position: relative; }
        .header-menu-btn {
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0;
        }
        .header-menu-bar {
            display: block;
            width: 18px;
            height: 2px;
            background: #ffffff;
            border-radius: 1px;
        }
        .header-menu-panel {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            min-width: 168px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            padding: 8px;
            z-index: 200;
        }
        body.dark-mode .header-menu-panel {
            background: var(--bg-card);
            border-color: var(--border-color);
        }
        .header-menu-nav { display: flex; flex-direction: column; gap: 2px; }
        .header-auth-btns { display: flex; align-items: center; gap: 8px; }
        .header-auth-btns[hidden] { display: none !important; }
        .header-menu-link {
            display: block;
            padding: 10px 12px;
            border-radius: 10px;
            color: #111827;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-align: left;
            border: none;
            background: transparent;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
        }
        body.dark-mode .header-menu-link { color: var(--text-main); }
        .header-menu-link:hover { background: #f3f4f6; }
        body.dark-mode .header-menu-link:hover { background: #2f3336; }
        .header-auth-btn {
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }
        .header-auth-btn--giris {
            background: #ffffff;
            color: #1d9bf0;
            border-color: #ffffff;
        }
        .header-profil-link {
            display: none;
            align-items: center;
            padding: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.45);
            text-decoration: none;
        }
        .header-profil-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            flex-shrink: 0;
        }
        .header-profil-link.cins-female .header-profil-avatar:not(.has-foto) { background-color: var(--female-color); }
        .header-profil-link.cins-male .header-profil-avatar:not(.has-foto) { background-color: var(--male-color); }
        .header-profil-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .header-profil-avatar.has-foto {
            background: transparent !important;
            overflow: hidden;
        }
        .auth-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2100;
            background: rgba(17, 24, 39, 0.32);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .auth-overlay.acik { display: flex; }
        .auth-modal-panel {
            --auth-accent: #2563eb;
            --auth-accent-border: #93c5fd;
            position: relative;
            width: 100%;
            max-width: 400px;
            max-height: 92vh;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 28px 22px 22px;
        }
        body.dark-mode .auth-modal-panel {
            background: var(--bg-card);
            border-color: var(--border-color);
        }
        .auth-modal-panel.cins-female {
            --auth-accent: var(--female-color);
            --auth-accent-border: var(--female-border);
            border-color: var(--female-border);
        }
        .auth-modal-panel.cins-male {
            --auth-accent: var(--male-color);
            --auth-accent-border: var(--male-border);
            border-color: var(--male-border);
        }
        .auth-modal-kapat {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            padding: 0;
            border: 1px solid #e5e7eb;
            border-radius: 50%;
            background: #f9fafb;
            color: #374151;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }
        body.dark-mode .auth-modal-kapat {
            background: var(--bg-main);
            border-color: var(--border-color);
            color: var(--text-muted);
        }
        .auth-brand { text-align: center; margin-bottom: 22px; padding-top: 4px; }
        .auth-brand-text {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #111827;
        }
        .auth-brand-text span { color: #ef4444; }
        body.dark-mode .auth-brand-text { color: var(--text-main); }
        .auth-modal-baslik {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 4px;
            text-align: center;
            color: var(--text-main);
        }
        .auth-modal-alt-baslik {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 18px;
            text-align: center;
        }
        .auth-etiket {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .auth-input,
        .auth-select {
            display: block;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1.5px solid var(--auth-accent-border);
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 500;
            outline: none;
        }
        body.dark-mode .auth-input,
        body.dark-mode .auth-select { background: var(--bg-main); }
        .auth-input:focus,
        .auth-select:focus {
            border-color: var(--auth-accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        .auth-cins-satir { display: flex; gap: 12px; margin-bottom: 20px; }
        .auth-cins-btn {
            flex: 1;
            padding: 12px 8px;
            border: 1.5px solid var(--auth-accent-border);
            border-radius: 12px;
            background: #ffffff;
            font-size: 12px;
            font-weight: 800;
            color: #6b7280;
            cursor: pointer;
        }
        body.dark-mode .auth-cins-btn { background: var(--bg-main); }
        .auth-cins-btn.secili-female {
            border-color: var(--female-color);
            background: var(--female-bg);
            color: var(--female-color);
        }
        .auth-cins-btn.secili-male {
            border-color: var(--male-color);
            background: var(--male-bg);
            color: var(--male-color);
        }
        .auth-kvkk {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 18px;
            font-size: 11px;
            line-height: 1.5;
            color: #6b7280;
            font-weight: 500;
        }
        .auth-kvkk input {
            margin-top: 3px;
            flex-shrink: 0;
            accent-color: var(--auth-accent);
        }
        .auth-kvkk a {
            color: var(--auth-accent);
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .auth-submit {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: var(--auth-accent);
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .auth-modal-panel.cins-female .auth-submit--kayit { background: var(--female-color); }
        .auth-modal-panel.cins-male .auth-submit--kayit { background: var(--male-color); }
        .auth-gecis {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
        }
        .auth-gecis button {
            border: none;
            background: none;
            padding: 0;
            font-size: 13px;
            font-weight: 700;
            color: var(--auth-accent);
            cursor: pointer;
        }
        .auth-view { display: none; }
        .auth-view.aktif { display: block; }
        .gunde5-toast {
            display: none;
            position: fixed;
            left: 50%;
            top: 50%;
            right: auto;
            bottom: auto;
            transform: translate(-50%, -50%);
            width: calc(100% - 32px);
            max-width: 400px;
            margin: 0;
            padding: 12px 16px;
            border-radius: 14px;
            background: #111827;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            z-index: 3500;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
        }
        .gunde5-toast--hata { background: #991b1b; }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 18px 16px 28px;
        }
        .page-title {
            font-size: 22px;
            margin: 10px 0 12px;
            letter-spacing: -0.02em;
            text-align: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 14px;
            margin: 12px 0;
        }
        .card h2 {
            font-size: 15px;
            margin: 0 0 8px;
        }
        .card p {
            margin: 0 0 10px;
            color: var(--text-muted);
            line-height: 1.55;
            font-size: 13.5px;
            font-weight: 600;
        }
        .card p:last-child { margin-bottom: 0; }
        .intro {
            margin: 0 0 16px;
            color: var(--text-main);
            line-height: 1.6;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
        .intro a {
            color: inherit;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
        }
        .accordion {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .accordion-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
        }
        .accordion-item[open] {
            border-color: rgba(37, 99, 235, 0.25);
        }
        body.dark-mode .accordion-item[open] {
            border-color: rgba(96, 165, 250, 0.3);
        }
        .accordion-item summary {
            list-style: none;
            cursor: pointer;
            padding: 14px 14px 14px 16px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            user-select: none;
        }
        .accordion-item summary::-webkit-details-marker { display: none; }
        .accordion-item summary::after {
            content: '+';
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            transition: transform 0.2s ease;
        }
        body.dark-mode .accordion-item summary::after {
            background: rgba(255, 255, 255, 0.06);
        }
        .accordion-item[open] summary::after {
            content: '−';
            transform: rotate(180deg);
        }
        .accordion-body {
            padding: 0 16px 14px;
            color: var(--text-muted);
            line-height: 1.55;
            font-size: 16px;
            font-weight: 600;
        }
        .accordion-body p { margin: 0; }
        .accordion-body a {
            color: inherit;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
            font-weight: 700;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            min-height: 64px;
            padding: 0 2px 8px;
            background: var(--header-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 2px;
            z-index: 1000;
            box-shadow: 0 -4px 14px rgba(0, 0, 0, 0.03);
        }
        .nav-item {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 6px 2px 8px;
            font-size: 10px;
            font-weight: 800;
            color: #9ca3af;
            cursor: pointer;
            text-decoration: none;
            line-height: 1.05;
        }
        .nav-item > span {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .nav-item.active { color: var(--text-main); }
        .nav-item .icon {
            font-size: 20px;
            margin-bottom: 2px;
            flex-shrink: 0;
        }
        .nav-item--btn {
            border: none;
            background: transparent;
            font: inherit;
            width: auto;
            color: inherit;
        }
        .nav-item--fab {
            flex: 0 0 auto;
            width: clamp(72px, 22vw, 96px);
            min-height: 68px;
            margin-bottom: 14px;
            padding: 10px 6px 12px;
            justify-content: center;
            align-self: flex-end;
            border-radius: 18px;
            background: linear-gradient(
                165deg,
                rgba(255, 255, 255, 0.97) 0%,
                rgba(248, 250, 252, 0.99) 50%,
                rgba(241, 245, 249, 0.96) 100%
            );
            border: 1px solid rgba(15, 23, 42, 0.07);
            box-shadow:
                0 10px 28px rgba(15, 23, 42, 0.08),
                0 2px 10px rgba(29, 155, 240, 0.14);
            color: var(--text-main);
            transform: translateY(-8px);
        }
        body.dark-mode .nav-item--fab {
            background: linear-gradient(
                165deg,
                rgba(34, 44, 58, 0.98) 0%,
                rgba(18, 24, 32, 0.99) 100%
            );
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow:
                0 12px 32px rgba(0, 0, 0, 0.45),
                0 2px 12px rgba(29, 155, 240, 0.2);
        }
        .nav-item--fab .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .nav-item--fab > span {
            font-size: 9.5px;
            font-weight: 900;
            letter-spacing: -0.22px;
            white-space: nowrap;
        }
        .mini-link {
            color: inherit;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
        }
        .saat-vurgu {
            font-weight: 900;
            color: #d97706;
            font-variant-numeric: tabular-nums;
        }
        body.dark-mode .saat-vurgu { color: #fbbf24; }
        .istat-filtre {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin: 0 0 16px;
        }
        .istat-filtre--haric {
            margin-top: -8px;
            margin-bottom: 14px;
        }
        .istat-filtre-etiket {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            margin-right: 2px;
        }
        .istat-filtre-not {
            font-weight: 700;
            color: var(--text-main);
        }
        .istat-gun-btn {
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .istat-gun-btn--aktif {
            background: #1d9bf0;
            border-color: #1d9bf0;
            color: #ffffff;
        }
        .istat-yenile-btn {
            border: 1px dashed var(--border-color);
            background: transparent;
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .istat-yukleniyor {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            padding: 24px 0;
        }
        .istat-yetkisiz {
            text-align: center;
            padding: 32px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }
        .istat-yetkisiz-metin {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .istat-giris-btn {
            border: none;
            background: #1d9bf0;
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }
        .istat-donem-notu {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 0 0 14px;
        }
        .istat-bolum { margin-bottom: 22px; }
        .istat-bolum-baslik {
            font-size: 14px;
            font-weight: 900;
            margin: 0 0 10px;
            letter-spacing: -0.02em;
        }
        .istat-kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .istat-kpi {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .istat-kpi-etiket {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
        }
        .istat-kpi-deger {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
        }
        .istat-kpi-alt {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            line-height: 1.35;
        }
        .istat-bolum-not {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin: -4px 0 10px;
            line-height: 1.45;
        }
        .istat-bolum--hero {
            background: linear-gradient(165deg, rgba(29, 155, 240, 0.08), rgba(29, 155, 240, 0.02));
            border: 1px solid rgba(29, 155, 240, 0.18);
            border-radius: 16px;
            padding: 14px 12px 12px;
        }
        body.dark-mode .istat-bolum--hero {
            background: linear-gradient(165deg, rgba(29, 155, 240, 0.14), rgba(29, 155, 240, 0.04));
            border-color: rgba(96, 165, 250, 0.22);
        }
        .istat-kpi-grid--hero {
            grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
        }
        .istat-kpi-grid--hero .istat-kpi-deger {
            font-size: 18px;
        }
        .istat-detay {
            margin: 18px 0;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-card);
            overflow: hidden;
        }
        .istat-detay summary {
            cursor: pointer;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 800;
            list-style: none;
        }
        .istat-detay summary::-webkit-details-marker { display: none; }
        .istat-detay[open] summary {
            border-bottom: 1px solid var(--border-color);
        }
        .istat-detay > .istat-kpi-grid,
        .istat-detay > .istat-bolum {
            padding: 0 12px 12px;
        }
        .istat-detay .istat-bolum-baslik {
            margin-top: 12px;
        }
        .istat-tablo-wrap {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
        }
        .istat-tablo {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .istat-tablo th,
        .istat-tablo td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }
        .istat-tablo th {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.03);
        }
        body.dark-mode .istat-tablo th { background: rgba(255, 255, 255, 0.04); }
        .istat-tablo tr:last-child td { border-bottom: none; }
        .istat-bos, .istat-hata {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            padding: 8px 0;
        }
        .istat-hata { color: #b91c1c; }
        body.dark-mode .istat-hata { color: #f87171; }
        .istat-capraz-link, .intro a {
            color: #1d9bf0;
            font-weight: 700;
            text-decoration: none;
        }
        .istat-capraz-link:hover, .intro a:hover { text-decoration: underline; }
    </style>
    <script src="js/gunde5-shell.js"></script>
    <script defer src="js/gunde5-perf.js"></script>
    <script src="js/gunde5-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/gunde5-profil.js"></script>
    <script src="js/gunde5-ui.js"></script>
    <script src="js/gunde5-db.js"></script>
    <script src="js/gunde5-paylas.js"></script>
    <script src="js/gunde5-bildirim.js"></script>
    <script src="js/gunde5-metrikler.js"></script>
</head>
<body>
    <header>
        <div class="header-sol">
            <div class="header-menu-wrap">
                <button type="button" class="header-menu-btn" id="headerMenuBtn" aria-label="Menü" aria-expanded="false" aria-controls="headerMenuPanel" onclick="Gunde5UI.toggleHeaderMenu(event)">
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                </button>
                <div class="header-menu-panel" id="headerMenuPanel" hidden>
                    <nav class="header-menu-nav" aria-label="Site menüsü"></nav>
                </div>
            </div>
        </div>
        <a href="/" class="header-brand">gunde<span class="header-brand-red">5</span>.com</a>
        <div class="header-sag">
            <div class="header-auth-btns" id="headerAuthBtns">
                <button type="button" class="header-auth-btn header-auth-btn--kayit" id="hdrKayit" onclick="openAuthModal('register')">Katıl</button>
                <button type="button" class="header-auth-btn header-auth-btn--giris" id="hdrGiris" onclick="openAuthModal('login')">Giriş</button>
            </div>
            <a href="/profil" class="header-profil-link" id="headerProfilLink" aria-label="Profilim">
                <span class="header-profil-avatar" id="headerProfilAvatar">♀</span>
            </a>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">📈 Metrikler</h1>
        <p class="intro">Sitede ne yaptılar — okuma, oy, paylaşım ve içerik performansı. Trafik kaynağı için <a href="/istatistikler">İstatistikler</a> sayfasına bakın.</p>

        <div id="metrikYetkisiz" class="istat-yetkisiz" hidden>
            <p class="istat-yetkisiz-metin"></p>
            <button type="button" class="istat-giris-btn" id="metrikGirisBtn" hidden>Giriş yap</button>
        </div>

        <div id="metrikFiltre" class="istat-filtre" hidden>
            <button type="button" class="istat-gun-btn" data-metrik-gun="7" aria-pressed="false">7 gün</button>
            <button type="button" class="istat-gun-btn istat-gun-btn--aktif" data-metrik-gun="30" aria-pressed="true">30 gün</button>
            <button type="button" class="istat-gun-btn" data-metrik-gun="90" aria-pressed="false">90 gün</button>
            <button type="button" class="istat-gun-btn" data-metrik-gun="365" aria-pressed="false">365 gün</button>
            <button type="button" class="istat-yenile-btn" id="metrikYenile">Yenile</button>
        </div>
        <div id="metrikHaricFiltre" class="istat-filtre istat-filtre--haric" hidden>
            <span class="istat-filtre-etiket">Hariç tut:</span>
            <button type="button" class="istat-gun-btn istat-gun-btn--aktif" data-metrik-haric="master" aria-pressed="true">Master</button>
            <button type="button" class="istat-gun-btn" data-metrik-haric="uyeler" aria-pressed="false">Tüm üyeler</button>
            <button type="button" class="istat-gun-btn" data-metrik-haric="yok" aria-pressed="false">Filtre yok</button>
        </div>

        <p id="metrikYukleniyor" class="istat-yukleniyor" hidden>Yükleniyor…</p>
        <div id="metrikIcerik" hidden></div>
    </div>

    <div id="authOverlay" class="auth-overlay" aria-hidden="true">
        <div class="auth-modal-panel" id="authModalPanel">
            <button type="button" class="auth-modal-kapat" onclick="closeAuthModal()" aria-label="Kapat">×</button>
            <div id="authRegister" class="auth-view aktif">
                <div class="auth-brand">
                    <div class="auth-brand-text">gunde<span>5</span>.com</div>
                </div>
                <div class="auth-cins-satir">
                    <button type="button" class="auth-cins-btn" id="regCinsFemale" onclick="secAuthCinsiyet('female')">♀ KADIN</button>
                    <button type="button" class="auth-cins-btn" id="regCinsMale" onclick="secAuthCinsiyet('male')">♂ ERKEK</button>
                </div>
                <input type="hidden" id="regGender" value="">
                <label class="auth-etiket" for="regUsername">Kullanıcı Adı</label>
                <input class="auth-input" type="text" id="regUsername" maxlength="15" minlength="5" placeholder="5–15 karakter" autocomplete="username">
                <label class="auth-etiket" for="regEmail">E-Posta</label>
                <input class="auth-input" type="email" id="regEmail" maxlength="80" placeholder="mail@adresin.com" autocomplete="email">
                <label class="auth-etiket" for="regPassword">Şifre</label>
                <input class="auth-input" type="password" id="regPassword" minlength="6" placeholder="Min. 6 karakter" autocomplete="new-password">
                <label class="auth-etiket auth-etiket--yil" for="regBirthYear">Doğum tarihi: (Minimum 18 yaş gerekir.)</label>
                <select class="auth-select" id="regBirthYear">
                    <option value="">Yıl</option>
                </select>
                <label class="auth-kvkk">
                    <input type="checkbox" id="authKvk">
                    <span><a href="/kvkk#sozlesme" target="_blank" rel="noopener" onclick="event.stopPropagation()">Kullanıcı Sözleşmesi</a>'ni ve <a href="/kvkk#aydinlatma" target="_blank" rel="noopener" onclick="event.stopPropagation()">KVKK Aydınlatma Metni</a>'ni okudum, onaylıyorum.</span>
                </label>
                <button type="button" class="auth-submit auth-submit--kayit" onclick="kayitOl()">Kayıt Ol</button>
                <p class="auth-gecis">Zaten üye misin? <button type="button" onclick="toggleAuthMode('login')">Giriş Yap</button></p>
            </div>
            <div id="authLogin" class="auth-view">
                <div class="auth-brand">
                    <div class="auth-brand-text">gunde<span>5</span>.com</div>
                </div>
                <h2 class="auth-modal-baslik">Üye Girişi</h2>
                <p class="auth-modal-alt-baslik">E-posta ve şifrenle giriş yap.</p>
                <label class="auth-etiket" for="loginEmail">E-Posta</label>
                <input class="auth-input" type="email" id="loginEmail" maxlength="80" placeholder="mail@adresin.com" autocomplete="email">
                <label class="auth-etiket" for="loginPassword">Şifre</label>
                <input class="auth-input" type="password" id="loginPassword" placeholder="Şifren" autocomplete="current-password">
                <button type="button" class="auth-submit auth-submit--giris" onclick="girisYap()">Giriş Yap</button>
                <p class="auth-gecis">Hesabınız yok mu? <button type="button" onclick="toggleAuthMode('register')">Kayıt Ol</button></p>
            </div>
        </div>
    </div>

    <div class="bottom-nav" role="navigation" aria-label="Ana menü">
        <a href="/" class="nav-item">
            <div class="icon">🏠</div><span>Anasayfa</span>
        </a>
        <button type="button" class="nav-item nav-item--btn nav-item--fab" id="navYazBtn" aria-haspopup="dialog">
            <div class="icon">✍️</div><span>Hikaye Yaz</span>
        </button>
        <a href="/podyum" class="nav-item">
            <div class="icon">🏆</div><span>Podyum</span>
        </a>
    </div>

    <script>
        function guncelleHeaderOturum() {
            Gunde5UI.guncelleHeaderOturum();
        }

        function openAuthModal(mode) {
            doldurYilSecenekleri();
            var overlay = document.getElementById('authOverlay');
            overlay.style.display = 'flex';
            overlay.classList.add('acik');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            toggleAuthMode(mode || 'register');
        }

        function toggleAuthMode(mode) {
            var reg = document.getElementById('authRegister');
            var log = document.getElementById('authLogin');
            if (mode === 'login') {
                reg.classList.remove('aktif');
                log.classList.add('aktif');
            } else {
                log.classList.remove('aktif');
                reg.classList.add('aktif');
            }
        }

        function secAuthCinsiyet(cins) {
            var panel = document.getElementById('authModalPanel');
            var maleBtn = document.getElementById('regCinsMale');
            var femaleBtn = document.getElementById('regCinsFemale');
            panel.classList.remove('cins-female', 'cins-male');
            maleBtn.classList.remove('secili-male');
            femaleBtn.classList.remove('secili-female');
            document.getElementById('regGender').value = cins;
            if (cins === 'male') {
                panel.classList.add('cins-male');
                maleBtn.classList.add('secili-male');
            } else {
                panel.classList.add('cins-female');
                femaleBtn.classList.add('secili-female');
            }
        }

        function doldurYilSecenekleri() {
            var sel = document.getElementById('regBirthYear');
            if (!sel || sel.options.length > 1) return;
            var yil = new Date().getFullYear() - 18;
            while (yil >= 1940) {
                var opt = document.createElement('option');
                opt.value = String(yil);
                opt.textContent = String(yil);
                sel.appendChild(opt);
                yil -= 1;
            }
        }

        async function kayitOl() {
            try {
                var u = await Gunde5DB.kayitOl({
                    username: document.getElementById('regUsername').value,
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value,
                    dogumYili: document.getElementById('regBirthYear').value,
                    gender: document.getElementById('regGender').value,
                    kvkk: document.getElementById('authKvk').checked
                });
                if (u && u.gender) document.body.setAttribute('data-user-gender', u.gender);
                Gunde5UI.oturumModallariKapat();
                guncelleHeaderOturum();
                Gunde5UI.showToast('Hoş geldin, ' + (u && u.username ? u.username : '') + '!');
                if (window.Gunde5Istatistik && Gunde5Istatistik.init) Gunde5Istatistik.init(true);
            } catch (err) {
                Gunde5UI.showToast(Gunde5DB.hataMesaji(err), 'hata');
            }
        }

        async function girisYap() {
            var email = document.getElementById('loginEmail').value.replace(/^\s+|\s+$/g, '');
            var sifre = document.getElementById('loginPassword').value;
            if (!email || !sifre) return;
            try {
                var u = await Gunde5DB.girisYap({ email: email, password: sifre });
                if (u && u.gender) document.body.setAttribute('data-user-gender', u.gender);
                Gunde5UI.oturumModallariKapat();
                guncelleHeaderOturum();
                Gunde5UI.showToast('Tekrar hoş geldin!');
                if (window.Gunde5Istatistik && Gunde5Istatistik.init) Gunde5Istatistik.init(true);
            } catch (err) {
                Gunde5UI.showToast(Gunde5DB.hataMesaji(err), 'hata');
            }
        }

        document.getElementById('navYazBtn').addEventListener('click', function () {
            window.location.href = '/?yaz=1';
        });
    </script>
</body>
</html>
