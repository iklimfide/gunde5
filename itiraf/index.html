<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikaye — gunde5.com</title>
    <script defer src="/js/gunde5-perf.js"></script>
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="description" content="Gunde5.com hikaye bağlantısı — yönlendiriliyor.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://gunde5.com/itiraf/">
    <meta property="og:site_name" content="gunde5.com">
    <meta property="og:locale" content="tr_TR">
    <meta name="theme-color" content="#1d9bf0">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
    <script src="/js/gunde5-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="/js/gunde5-db.js"></script>
    <script src="/js/gunde5-bildirim.js"></script>
</head>
<body>
    <p>Yönlendiriliyor…</p>
    <script>
        (function () {
            function kok(path) {
                return new URL(path, window.location.origin).href;
            }

            function itirafIdBul() {
                var parcalar = location.pathname.replace(/\/+$/, '').split('/');
                var i;
                for (i = 0; i < parcalar.length; i++) {
                    if (parcalar[i] === 'itiraf' && parcalar[i + 1] && /^\d+$/.test(parcalar[i + 1])) {
                        return parcalar[i + 1];
                    }
                }
                var q = new URLSearchParams(location.search);
                if (q.get('id') && /^\d+$/.test(q.get('id'))) return q.get('id');
                if (q.get('itiraf') && /^\d+$/.test(q.get('itiraf'))) return q.get('itiraf');
                return null;
            }

            function git404(id) {
                var url = kok('/404.html');
                if (id) url += '?itiraf=' + encodeURIComponent(id);
                location.replace(url);
            }

            var id = itirafIdBul();
            if (!id) {
                git404(null);
                return;
            }

            if (!window.Gunde5DB || !Gunde5DB.isConfigured || !Gunde5DB.isConfigured()) {
                git404(id);
                return;
            }

            Gunde5DB.init().then(function () {
                return Gunde5DB.itirafGetir(id);
            }).then(function (row) {
                if (!row) {
                    git404(id);
                    return;
                }
                var sayfa = row.status === 'podyum' ? '/index.html?itiraf=' : '/kulis.html?itiraf=';
                location.replace(kok(sayfa) + encodeURIComponent(id));
            }).catch(function () {
                git404(id);
            });
        })();
    </script>
</body>
</html>
