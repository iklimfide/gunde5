<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planlı — gunde5.com</title>
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="description" content="Planlı hikaye önizlemesi — yalnızca yönetici.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="css/index.css?v=37">
    <link rel="stylesheet" href="css/gunde5-topbar.css?v=5">
    <style>
        .pl-page { max-width: 640px; margin: 0 auto; padding: 0 0 48px; }
        .pl-baslik { font-size: clamp(22px, 5vw, 28px); font-weight: 900; letter-spacing: -.03em; padding: 16px 16px 8px; }
        .pl-intro { color: var(--text-muted, #6b7280); font-size: 14px; line-height: 1.5; padding: 0 16px 16px; }
        body.dark-mode .pl-intro { color: #9ca3af; }
        .pl-gun-blok { margin-bottom: 8px; }
        .pl-gun-bant {
            margin: 20px 16px 12px;
            padding: 12px 14px;
            border-radius: 14px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #1f2937;
            text-align: center;
        }
        .pl-gun-bant-etiket { font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; opacity: .85; }
        .pl-gun-bant-tarih { font-size: clamp(20px, 5vw, 26px); font-weight: 900; margin-top: 2px; }
        .pl-gun-bant-saat { font-size: 13px; font-weight: 700; margin-top: 4px; opacity: .9; }
        .pl-liste { padding: 0 8px; }
        .pl-liste .story-card { margin-bottom: 14px; }
        .pl-onizleme-not {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted, #6b7280);
            padding: 10px 12px 4px;
        }
        .pl-kart-link { display: block; text-align: center; padding: 0 12px 12px; font-size: 13px; font-weight: 700; }
        .pl-kart-link a { color: #1d9bf0; text-decoration: none; }
        .pl-bos, .pl-hata, .pl-yukleniyor, .pl-yetkisiz {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-muted, #6b7280);
            font-size: 15px;
            line-height: 1.5;
        }
        .pl-yetkisiz .pl-btn {
            margin-top: 14px;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #1d9bf0;
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
        }
        .pl-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            padding: 0 16px 12px;
        }
        .pl-input, .pl-select {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color, #e5e7eb);
            background: var(--card-bg, #fff);
            font-size: 13px;
            font-weight: 600;
            min-height: 36px;
        }
        .pl-input { flex: 1 1 200px; min-width: 0; }
        .pl-select { min-width: 130px; }
        body.dark-mode .pl-input,
        body.dark-mode .pl-select { background: #0b0f14; border-color: rgba(255,255,255,.12); color: #e7e9ea; }
        .pl-meta { font-size: 13px; font-weight: 700; color: var(--text-muted, #6b7280); margin-left: auto; flex: 1 1 100%; }
        @media (min-width: 520px) {
            .pl-meta { flex: 0 1 auto; margin-left: auto; }
        }
        .pl-btn-kucuk {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color, #e5e7eb);
            background: var(--card-bg, #fff);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }
        body.dark-mode .pl-btn-kucuk { background: #0b0f14; border-color: rgba(255,255,255,.12); color: #e7e9ea; }
        .planli-yayin-etiket {
            display: inline-block;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(245, 158, 11, .18);
            color: #b45309;
        }
        body.dark-mode .planli-yayin-etiket { background: rgba(245, 158, 11, .25); color: #fbbf24; }
        .pl-kart-footer { display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
        .pl-duzenle-btn {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #f59e0b;
            border-radius: 12px;
            background: rgba(245, 158, 11, .1);
            color: #b45309;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
        }
        .pl-duzenle-btn:hover { background: rgba(245, 158, 11, .18); }
        body.dark-mode .pl-duzenle-btn { color: #fbbf24; border-color: #f59e0b; background: rgba(245, 158, 11, .15); }
        .pl-drawer { position: fixed; inset: 0; z-index: 1200; display: none; }
        .pl-drawer.acik { display: block; }
        .pl-drawer-bg { position: absolute; inset: 0; background: rgba(15, 23, 42, .45); }
        .pl-drawer-panel {
            position: absolute; top: 0; right: 0; width: min(560px, 100%); height: 100%;
            background: var(--card-bg, #fff); border-left: 1px solid var(--border-color, #e5e7eb);
            display: flex; flex-direction: column; box-shadow: -12px 0 32px rgba(0, 0, 0, .18);
        }
        body.dark-mode .pl-drawer-panel { background: #0b0f14; border-color: rgba(255, 255, 255, .1); }
        .pl-drawer-head {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            padding: 16px; border-bottom: 1px solid var(--border-color, #e5e7eb);
        }
        body.dark-mode .pl-drawer-head { border-color: rgba(255, 255, 255, .1); }
        .pl-drawer-head h2 { font-size: 18px; font-weight: 900; margin: 0; }
        .pl-drawer-close { border: none; background: transparent; font-size: 28px; line-height: 1; cursor: pointer; }
        .pl-drawer-body { flex: 1; overflow: auto; padding: 16px; display: grid; gap: 14px; }
        .pl-alan label { display: grid; gap: 6px; font-size: 12px; font-weight: 700; color: var(--text-muted, #6b7280); }
        .pl-alan input, .pl-alan select, .pl-alan textarea {
            width: 100%; border: 1px solid var(--border-color, #e5e7eb); border-radius: 12px;
            background: var(--card-bg, #fff); color: var(--text-main, #111); padding: 10px 12px; font: inherit;
        }
        body.dark-mode .pl-alan input,
        body.dark-mode .pl-alan select,
        body.dark-mode .pl-alan textarea { background: #0b0f14; border-color: rgba(255, 255, 255, .12); color: #e7e9ea; }
        .pl-alan textarea { min-height: 180px; resize: vertical; line-height: 1.45; }
        .pl-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .pl-grid--tek { grid-template-columns: 1fr; }
        .pl-form-actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .pl-form-btn {
            padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border-color, #e5e7eb);
            background: var(--card-bg, #fff); font-weight: 800; font-size: 14px; cursor: pointer; font-family: inherit;
        }
        .pl-form-btn--primary { background: #1d9bf0; border-color: #1d9bf0; color: #fff; }
        .pl-form-btn--danger { color: #b91c1c; border-color: #fecaca; }
        body.dark-mode .pl-form-btn { background: #0b0f14; border-color: rgba(255, 255, 255, .12); color: #e7e9ea; }
        body.dark-mode .pl-form-btn--primary { background: #1d9bf0; border-color: #1d9bf0; color: #fff; }
        .pl-form-not { font-size: 12px; color: var(--text-muted, #6b7280); line-height: 1.45; margin: 0; }
        @media (max-width: 640px) { .pl-grid { grid-template-columns: 1fr; } }
    </style>
    <script src="js/gunde5-shell.js"></script>
    <script src="js/gunde5-hikaye-koruma.js"></script>
    <script src="js/gunde5-perde.js?v=2"></script>
    <script defer src="js/gunde5-config.js?v=17"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" crossorigin></script>
    <script defer src="js/gunde5-profil.js"></script>
    <script defer src="js/gunde5-ui.js"></script>
    <script defer src="js/gunde5-db.js?v=53"></script>
    <script defer src="js/gunde5-bildirim.js?v=3"></script>
    <script defer src="js/gunde5-master.js?v=4"></script>
    <script defer src="js/gunde5-slug.js"></script>
    <script defer src="js/gunde5-planli.js?v=4"></script>
</head>
<body>
    <header class="page-topbar" id="planliPageTopbar">
        <div class="page-topbar-sol" id="planliTopbarSol" hidden>
            <div class="header-menu-wrap">
                <button type="button" class="topbar-menu-btn" id="headerMenuBtn" aria-label="Menü" aria-expanded="false" aria-controls="headerMenuPanel" onclick="Gunde5UI.toggleHeaderMenu(event)">
                    <span class="topbar-menu-bar" aria-hidden="true"></span>
                    <span class="topbar-menu-bar" aria-hidden="true"></span>
                    <span class="topbar-menu-bar" aria-hidden="true"></span>
                </button>
                <div class="header-menu-panel" id="headerMenuPanel" hidden>
                    <nav class="header-menu-nav" aria-label="Site menüsü"></nav>
                </div>
            </div>
        </div>
        <a href="/" class="brand">gunde<span class="brand-five">5</span>.com</a>
        <div class="header-sag page-topbar-sag" id="planliTopbarSag">
            <a href="/profil" class="header-profil-link" id="headerProfilLink" aria-label="Profilim">
                <span class="header-profil-avatar" id="headerProfilAvatar">♀</span>
            </a>
            <button type="button" class="theme-fab" onclick="toggleTheme()" id="themeBtn" aria-label="Tema değiştir">🌙</button>
        </div>
    </header>

    <main class="pl-page">
        <h1 class="pl-baslik">📅 Planlı hikayeler</h1>
        <p class="pl-intro">Gelecekte yayınlanacak hikayelerin sitede nasıl görüneceğinin önizlemesi. Anasayfada henüz görünmezler.</p>

        <div id="plYukleniyor" class="pl-yukleniyor">Yükleniyor…</div>
        <div id="plYetkisiz" class="pl-yetkisiz" hidden>
            <p id="plYetkisizMetin"></p>
            <button type="button" class="pl-btn" id="plGirisBtn" hidden>Giriş yap</button>
        </div>

        <div id="plIcerik" hidden>
            <div class="pl-toolbar">
                <input type="search" id="plAra" class="pl-input" placeholder="Başlık, metin, rumuz veya ID…" autocomplete="off" aria-label="Hikaye ara">
                <select id="plTarih" class="pl-select" aria-label="Tarih filtresi">
                    <option value="">Tüm tarihler</option>
                </select>
                <select id="plSira" class="pl-select" aria-label="Sıralama">
                    <option value="desc" selected>Yeniden eskiye</option>
                    <option value="asc">Eskiden yeniye</option>
                </select>
                <button type="button" class="pl-btn-kucuk" id="plYenile">Yenile</button>
                <span class="pl-meta" id="plMeta">—</span>
            </div>
            <div id="plListe"></div>
        </div>
    </main>

    <div class="pl-drawer" id="plDrawer" hidden aria-hidden="true">
        <div class="pl-drawer-bg" data-pl-kapat></div>
        <div class="pl-drawer-panel" role="dialog" aria-labelledby="plDrawerBaslik">
            <div class="pl-drawer-head">
                <h2 id="plDrawerBaslik">Hikâye düzenle</h2>
                <button type="button" class="pl-drawer-close" data-pl-kapat aria-label="Kapat">×</button>
            </div>
            <div class="pl-drawer-body" id="plDrawerBody"></div>
        </div>
    </div>
</body>
</html>
