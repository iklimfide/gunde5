<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim — gunde5.com</title>
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="description" content="Gunde5.com iletişim: Arif G. eğlence ve mizah amaçlı kurulmuştur. İstek, öneri ve talepler için arif@gunde5.com">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://gunde5.com/iletisim">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="gunde5.com">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:title" content="İletişim — gunde5.com">
    <meta property="og:description" content="Gunde5.com iletişim ve geri bildirim.">
    <meta property="og:url" content="https://gunde5.com/iletisim">
    <meta property="og:image" content="https://gunde5.com/apple-touch-icon.png">
    <meta name="twitter:card" content="summary">
    <meta name="theme-color" content="#6d28d9">
    <style>
        :root {
            --bg-main: #f7f7f7;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --header-bg: #ffffff;
            --link-color: #2563eb;
            --female-color: #db2777;
            --female-bg: #fff1f2;
            --female-border: #fecdd3;
            --male-color: #2563eb;
            --male-bg: #eff6ff;
            --male-border: #bfdbfe;
        }
        body.dark-mode {
            --bg-main: #0f1419;
            --bg-card: #0b0f14;
            --text-main: #e7e9ea;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.10);
            --header-bg: #161a1e;
            --link-color: #60a5fa;
            --female-color: #f43f5e;
            --female-bg: #201319;
            --female-border: #4c1d24;
            --male-color: #1d9bf0;
            --male-bg: #0e1924;
            --male-border: #1d354b;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 24px;
            line-height: 1.6;
            transition: background-color 0.2s, color 0.2s;
        }
        header {
            background-color: #1d9bf0;
            color: #ffffff;
            padding: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            border-bottom: 1px solid #1a8cd8;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-brand {
            color: #ffffff;
            text-decoration: none;
        }
        .header-brand:hover { opacity: 0.92; }
        .header-brand-red { color: #ef4444; }
        header .header-auth-btn {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.45);
            color: #ffffff;
        }
        .header-sol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 110;
        }
        .header-sag {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 110;
        }
        .header-menu-wrap { position: relative; }
        .header-menu-btn {
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0;
        }
        .header-menu-bar {
            display: block;
            width: 18px;
            height: 2px;
            background: #ffffff;
            border-radius: 1px;
        }
        .header-menu-panel {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            min-width: 168px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            padding: 8px;
            z-index: 200;
        }
        body.dark-mode .header-menu-panel {
            background: var(--bg-card);
            border-color: var(--border-color);
        }
        .header-menu-nav { display: flex; flex-direction: column; gap: 2px; }
        .header-auth-btns { display: flex; align-items: center; gap: 8px; }
        .header-auth-btns[hidden] { display: none !important; }
        .header-menu-link {
            display: block;
            padding: 10px 12px;
            border-radius: 10px;
            color: #111827;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-align: left;
            border: none;
            background: transparent;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
        }
        body.dark-mode .header-menu-link { color: var(--text-main); }
        .header-menu-link:hover { background: #f3f4f6; }
        body.dark-mode .header-menu-link:hover { background: #2f3336; }
        .header-auth-btn {
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }
        .header-auth-btn--giris {
            background: #ffffff;
            color: #1d9bf0;
            border-color: #ffffff;
        }
        .header-profil-link {
            display: none;
            align-items: center;
            padding: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.45);
            text-decoration: none;
        }
        .header-profil-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            flex-shrink: 0;
        }
        .header-profil-link.cins-female .header-profil-avatar:not(.has-foto) { background-color: var(--female-color); }
        .header-profil-link.cins-male .header-profil-avatar:not(.has-foto) { background-color: var(--male-color); }
        .header-profil-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .header-profil-avatar.has-foto {
            background: transparent !important;
            overflow: hidden;
        }
        .auth-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2100;
            background: rgba(17, 24, 39, 0.32);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .auth-overlay.acik { display: flex; }
        .auth-modal-panel {
            --auth-accent: #2563eb;
            --auth-accent-border: #93c5fd;
            position: relative;
            width: 100%;
            max-width: 400px;
            max-height: 92vh;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 28px 22px 22px;
        }
        body.dark-mode .auth-modal-panel {
            background: var(--bg-card);
            border-color: var(--border-color);
        }
        .auth-modal-panel.cins-female {
            --auth-accent: var(--female-color);
            --auth-accent-border: var(--female-border);
            border-color: var(--female-border);
        }
        .auth-modal-panel.cins-male {
            --auth-accent: var(--male-color);
            --auth-accent-border: var(--male-border);
            border-color: var(--male-border);
        }
        .auth-modal-kapat {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            padding: 0;
            border: 1px solid #e5e7eb;
            border-radius: 50%;
            background: #f9fafb;
            color: #374151;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }
        body.dark-mode .auth-modal-kapat {
            background: var(--bg-main);
            border-color: var(--border-color);
            color: var(--text-muted);
        }
        .auth-brand { text-align: center; margin-bottom: 22px; padding-top: 4px; }
        .auth-brand-text {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #111827;
        }
        .auth-brand-text span { color: #ef4444; }
        body.dark-mode .auth-brand-text { color: var(--text-main); }
        .auth-modal-baslik {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 4px;
            text-align: center;
            color: var(--text-main);
        }
        .auth-modal-alt-baslik {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 18px;
            text-align: center;
        }
        .auth-etiket {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .auth-input,
        .auth-select {
            display: block;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1.5px solid var(--auth-accent-border);
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 500;
            outline: none;
        }
        body.dark-mode .auth-input,
        body.dark-mode .auth-select { background: var(--bg-main); }
        .auth-cins-satir { display: flex; gap: 12px; margin-bottom: 20px; }
        .auth-cins-btn {
            flex: 1;
            padding: 12px 8px;
            border: 1.5px solid var(--auth-accent-border);
            border-radius: 12px;
            background: #ffffff;
            font-size: 12px;
            font-weight: 800;
            color: #6b7280;
            cursor: pointer;
        }
        body.dark-mode .auth-cins-btn { background: var(--bg-main); }
        .auth-cins-btn.secili-female {
            border-color: var(--female-color);
            background: var(--female-bg);
            color: var(--female-color);
        }
        .auth-cins-btn.secili-male {
            border-color: var(--male-color);
            background: var(--male-bg);
            color: var(--male-color);
        }
        .auth-kvkk {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 18px;
            font-size: 11px;
            line-height: 1.5;
            color: #6b7280;
            font-weight: 500;
        }
        .auth-kvkk input {
            margin-top: 3px;
            flex-shrink: 0;
            accent-color: var(--auth-accent);
        }
        .auth-kvkk a {
            color: var(--auth-accent);
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .auth-submit {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: var(--auth-accent);
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .auth-modal-panel.cins-female .auth-submit--kayit { background: var(--female-color); }
        .auth-modal-panel.cins-male .auth-submit--kayit { background: var(--male-color); }
        .auth-gecis {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
        }
        .auth-gecis button {
            border: none;
            background: none;
            padding: 0;
            font-size: 13px;
            font-weight: 700;
            color: var(--auth-accent);
            cursor: pointer;
        }
        .auth-view { display: none; }
        .auth-view.aktif { display: block; }
        .gunde5-toast {
            display: none;
            position: fixed;
            left: 50%;
            top: 50%;
            right: auto;
            bottom: auto;
            transform: translate(-50%, -50%);
            width: calc(100% - 32px);
            max-width: 400px;
            margin: 0;
            padding: 12px 16px;
            border-radius: 14px;
            background: #111827;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            z-index: 3500;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
        }
        .gunde5-toast--hata { background: #991b1b; }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 18px 16px 28px;
        }
        .page-title {
            font-size: 22px;
            margin: 10px 0 8px;
            letter-spacing: -0.02em;
            text-align: center;
        }
        .guncelleme {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            margin: 0 0 20px;
        }
        .toc {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .toc h2 {
            font-size: 14px;
            margin: 0 0 10px;
        }
        .toc ul {
            margin: 0;
            padding-left: 18px;
            font-size: 15px;
            font-weight: 600;
        }
        .toc a {
            color: var(--link-color);
            text-decoration: none;
        }
        .toc a:hover { text-decoration: underline; }
        .legal-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px 16px;
            margin-bottom: 16px;
        }
        .legal-section h2 {
            font-size: 18px;
            margin: 0 0 14px;
            letter-spacing: -0.02em;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .legal-section h3 {
            font-size: 15px;
            margin: 18px 0 8px;
        }
        .legal-section p,
        .legal-section li {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
            margin: 0 0 10px;
        }
        .legal-section ul,
        .legal-section ol {
            margin: 0 0 12px;
            padding-left: 20px;
        }
        .legal-section li { margin-bottom: 6px; }
        .legal-section a {
            color: var(--link-color);
            font-weight: 600;
        }
        .saat-vurgu {
            font-weight: 900;
            color: #d97706;
            font-variant-numeric: tabular-nums;
        }
        body.dark-mode .saat-vurgu { color: #fbbf24; }
    </style>
    <script src="js/gunde5-shell.js"></script>
    <script defer src="js/gunde5-perf.js"></script>
    <script src="js/gunde5-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/gunde5-profil.js"></script>
    <script src="js/gunde5-ui.js"></script>
    <script src="js/gunde5-db.js"></script>
    <script src="js/gunde5-paylas.js"></script>
    <script src="js/gunde5-bildirim.js"></script>
    <link rel="stylesheet" href="css/gunde5-topbar.css?v=1">
</head>
<body>
    <header>
        <div class="header-sol">
            <div class="header-menu-wrap">
                <button type="button" class="header-menu-btn" id="headerMenuBtn" aria-label="Menü" aria-expanded="false" aria-controls="headerMenuPanel" onclick="Gunde5UI.toggleHeaderMenu(event)">
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                </button>
                <div class="header-menu-panel" id="headerMenuPanel" hidden>
                    <nav class="header-menu-nav" aria-label="Site menüsü"></nav>
                </div>
            </div>
        </div>
        <a href="/" class="header-brand">gunde<span class="header-brand-red">5</span>.com</a>
        <div class="header-sag">
            <a href="/profil" class="header-profil-link" id="headerProfilLink" aria-label="Profilim">
                <span class="header-profil-avatar" id="headerProfilAvatar">♀</span>
            </a>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">İletişim</h1>

        <section class="legal-section">
            <p>Gunde5.com <strong>Arif G.</strong> tarafından eğlence ve mizah amaçlı kurulmuştur. Herhangi bir ticari beklentisi yoktur.</p>
            <p>İstek, öneri ve talepleriniz için <a href="mailto:arif@gunde5.com">arif@gunde5.com</a> adresine yazabilirsiniz.</p>
        </section>
    </div>

    <script>
        function guncelleHeaderOturum() {
            Gunde5UI.guncelleHeaderOturum();
        }

        Gunde5DB.init().then(function () {
            guncelleHeaderOturum();
        });
    </script>
</body>
</html>
