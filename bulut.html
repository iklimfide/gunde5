<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulut</title>
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --bg: #0f172a;
            --kart: #1e293b;
            --metin: #f1f5f9;
            --soluk: #94a3b8;
            --cizgi: rgba(148, 163, 184, 0.22);
            --vurgu: #38bdf8;
            --hata: #f87171;
            --ok: #4ade80;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background: radial-gradient(ellipse at top, #1e3a5f 0%, var(--bg) 55%);
            color: var(--metin);
        }
        .bulut-wrap {
            width: 100%;
            max-width: 380px;
        }
        .bulut-baslik {
            text-align: center;
            margin-bottom: 22px;
        }
        .bulut-baslik h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.04em;
        }
        .bulut-baslik p {
            margin-top: 6px;
            font-size: 13px;
            color: var(--soluk);
            font-weight: 500;
        }
        .bulut-kart {
            background: var(--kart);
            border: 1px solid var(--cizgi);
            border-radius: 16px;
            padding: 22px 20px;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
        }
        .bulut-kart[hidden],
        .bulut-durum[hidden] {
            display: none !important;
        }
        .bulut-etiket {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--soluk);
            margin-bottom: 6px;
        }
        .bulut-input {
            display: block;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 14px;
            border: 1px solid var(--cizgi);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.55);
            color: var(--metin);
            font-size: 15px;
            outline: none;
        }
        .bulut-input:focus {
            border-color: var(--vurgu);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
        }
        .bulut-submit {
            display: block;
            width: 100%;
            margin-top: 4px;
            padding: 13px 16px;
            border: none;
            border-radius: 10px;
            background: var(--vurgu);
            color: #0f172a;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .bulut-submit:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .bulut-hata {
            margin-top: 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--hata);
            line-height: 1.45;
        }
        .bulut-durum {
            text-align: center;
        }
        .bulut-durum p {
            font-size: 14px;
            line-height: 1.55;
            color: var(--soluk);
            margin-bottom: 16px;
        }
        .bulut-durum--ok p { color: var(--ok); font-weight: 600; }
        .bulut-durum--red p { color: var(--hata); font-weight: 600; }
        .bulut-link,
        .bulut-btn-ikincil {
            display: inline-block;
            padding: 11px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }
        .bulut-link {
            background: var(--vurgu);
            color: #0f172a;
        }
        .bulut-btn-ikincil {
            border: 1px solid var(--cizgi);
            background: transparent;
            color: var(--metin);
        }
        .bulut-yukleniyor {
            text-align: center;
            font-size: 13px;
            color: var(--soluk);
            padding: 28px 0;
        }
    </style>
    <script src="js/gunde5-shell.js"></script>
    <script defer src="js/gunde5-config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" crossorigin></script>
    <script defer src="js/gunde5-db.js"></script>
    <script defer src="js/gunde5-ui.js"></script>
    <script defer src="js/gunde5-bulut.js"></script>
    <link rel="stylesheet" href="css/gunde5-topbar.css?v=1">
</head>
<body>
    <div class="bulut-wrap">
        <div class="bulut-baslik">
            <h1>Bulut</h1>
            <p>Yönetici oturumu</p>
        </div>

        <p class="bulut-yukleniyor" id="bulutYukleniyor">Kontrol ediliyor…</p>

        <div class="bulut-kart" id="bulutGiris" hidden>
            <form id="bulutForm" autocomplete="on">
                <label class="bulut-etiket" for="bulutEmail">E-posta</label>
                <input class="bulut-input" type="email" id="bulutEmail" name="email" autocomplete="username" required>

                <label class="bulut-etiket" for="bulutSifre">Şifre</label>
                <input class="bulut-input" type="password" id="bulutSifre" name="password" autocomplete="current-password" required>

                <button type="submit" class="bulut-submit" id="bulutSubmit">Giriş yap</button>
                <p class="bulut-hata" id="bulutHata" hidden></p>
            </form>
        </div>

        <div class="bulut-kart bulut-durum bulut-durum--red" id="bulutRed" hidden>
            <p id="bulutRedMetin">Bu hesap yönetici hesabı değil.</p>
            <button type="button" class="bulut-btn-ikincil" id="bulutCikisBtn">Çıkış yap</button>
        </div>

        <div class="bulut-kart bulut-durum bulut-durum--ok" id="bulutOk" hidden>
            <p>Yönetici oturumu açıldı.</p>
            <a href="/" class="bulut-link" id="bulutAnaLink">Anasayfaya git</a>
        </div>
    </div>
</body>
</html>
