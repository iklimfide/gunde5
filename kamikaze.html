<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamikaze — gunde5.com</title>
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="description" content="gunde5 master hikaye paneli.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --km-bg: #f7f7f7;
            --km-card: #ffffff;
            --km-text: #111827;
            --km-muted: #6b7280;
            --km-border: #e5e7eb;
            --km-accent: #1d9bf0;
            --female-color: #db2777;
            --male-color: #2563eb;
        }
        body.dark-mode {
            --km-bg: #0f1419;
            --km-card: #0b0f14;
            --km-text: #e7e9ea;
            --km-muted: #9ca3af;
            --km-border: rgba(255,255,255,0.1);
            --female-color: #f43f5e;
            --male-color: #1d9bf0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--km-bg); color: var(--km-text); }
        header {
            background: #1d9bf0; color: #fff; padding: 16px; text-align: center;
            font-size: 24px; font-weight: 900; letter-spacing: -1px;
            border-bottom: 1px solid #1a8cd8; position: sticky; top: 0; z-index: 100;
        }
        .header-brand { color: #fff; text-decoration: none; }
        .header-brand-red { color: #ef4444; }
        .header-sol, .header-sag {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 110;
        }
        .header-sol { left: 16px; }
        .header-sag { right: 16px; display: flex; align-items: center; gap: 8px; }
        .header-menu-wrap { position: relative; }
        .header-menu-btn {
            width: 38px; height: 38px; border: 1px solid rgba(255,255,255,.45);
            background: rgba(255,255,255,.18); border-radius: 10px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 0;
        }
        .header-menu-bar { display: block; width: 18px; height: 2px; background: #fff; border-radius: 1px; }
        .header-menu-panel {
            position: absolute; top: calc(100% + 8px); left: 0; min-width: 176px;
            background: var(--km-card); border: 1px solid var(--km-border); border-radius: 14px;
            box-shadow: 0 12px 32px rgba(0,0,0,.18); padding: 8px; z-index: 200;
        }
        .header-menu-nav { display: flex; flex-direction: column; gap: 2px; }
        .header-menu-link {
            display: block; padding: 10px 12px; border-radius: 10px; color: var(--km-text);
            text-decoration: none; font-size: 13px; font-weight: 700;
        }
        .header-profil-link {
            display: none; align-items: center; padding: 4px; border-radius: 50%;
            background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.45); text-decoration: none;
        }
        .header-profil-avatar {
            width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 14px; font-weight: 800; color: #fff;
        }
        .header-profil-link.cins-female .header-profil-avatar:not(.has-foto) { background: #db2777; }
        .header-profil-link.cins-male .header-profil-avatar:not(.has-foto) { background: #2563eb; }

        .km-page { width: min(1400px, calc(100% - 32px)); margin: 0 auto; padding: 18px 16px 40px; }
        .km-title { font-size: clamp(22px, 2.4vw, 28px); font-weight: 900; margin: 4px 0 8px; }
        .km-intro { color: var(--km-muted); font-size: 14px; line-height: 1.5; max-width: 72ch; margin-bottom: 16px; }
        .km-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
        .km-input, .km-select, .km-btn {
            border: 1px solid var(--km-border); border-radius: 12px; background: var(--km-card);
            color: var(--km-text); font: inherit; padding: 10px 12px;
        }
        .km-input { flex: 1 1 220px; min-width: 0; }
        .km-select { min-width: 140px; }
        .km-btn { cursor: pointer; font-weight: 800; font-size: 13px; }
        .km-btn:hover { filter: brightness(.98); }
        .km-btn--primary { background: var(--km-accent); border-color: var(--km-accent); color: #fff; }
        .km-btn--ghost { background: transparent; }
        .km-meta { font-size: 12px; color: var(--km-muted); margin-left: auto; }
        .km-yetkisiz, .km-bos, .km-hata { padding: 24px; text-align: center; color: var(--km-muted); }
        .km-hata { color: #b91c1c; }
        .km-table-wrap { overflow-x: auto; border: 1px solid var(--km-border); border-radius: 14px; background: var(--km-card); }
        .km-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .km-table th, .km-table td { padding: 10px 12px; border-bottom: 1px solid var(--km-border); text-align: left; vertical-align: top; }
        .km-table th { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--km-muted); background: rgba(29,155,240,.06); }
        .km-table tr:last-child td { border-bottom: none; }
        .km-table tbody tr { cursor: pointer; }
        .km-table tbody tr:hover { background: rgba(29,155,240,.06); }
        .km-onizleme { color: var(--km-muted); font-size: 12px; margin-top: 4px; max-width: 420px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .km-rumuz { font-size: 14px; font-weight: 800; }
        .km-rumuz--female { color: var(--female-color); }
        .km-rumuz--male { color: var(--male-color); }
        .km-baslik { font-weight: 800; color: var(--km-text); }
        body.dark-mode .km-baslik { color: var(--km-text); }
        .km-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; }
        .km-badge--index { background: #dcfce7; color: #166534; }
        .km-badge--planli { background: #dbeafe; color: #1d4ed8; }
        .km-badge--podyum { background: #fef3c7; color: #b45309; }
        .km-badge--gizli { background: #f3f4f6; color: #4b5563; }
        .km-badge--silinen { background: #fee2e2; color: #991b1b; }
        body.dark-mode .km-badge--index { background: rgba(34,197,94,.15); color: #86efac; }
        body.dark-mode .km-badge--planli { background: rgba(59,130,246,.15); color: #93c5fd; }
        body.dark-mode .km-badge--podyum { background: rgba(245,158,11,.15); color: #fcd34d; }
        body.dark-mode .km-badge--gizli { background: rgba(255,255,255,.08); color: #d1d5db; }
        body.dark-mode .km-badge--silinen { background: rgba(239,68,68,.15); color: #fca5a5; }

        .km-drawer { position: fixed; inset: 0; z-index: 1200; display: none; }
        .km-drawer.acik { display: block; }
        .km-drawer-bg { position: absolute; inset: 0; background: rgba(15,23,42,.45); }
        .km-drawer-panel {
            position: absolute; top: 0; right: 0; width: min(560px, 100%); height: 100%;
            background: var(--km-bg); border-left: 1px solid var(--km-border);
            display: flex; flex-direction: column; box-shadow: -12px 0 32px rgba(0,0,0,.18);
        }
        .km-drawer-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 16px; border-bottom: 1px solid var(--km-border); }
        .km-drawer-head h2 { font-size: 18px; font-weight: 900; }
        .km-drawer-close { border: none; background: transparent; font-size: 28px; line-height: 1; cursor: pointer; color: var(--km-text); }
        .km-drawer-body { flex: 1; overflow: auto; padding: 16px; display: grid; gap: 14px; }
        .km-alan label { display: grid; gap: 6px; font-size: 12px; font-weight: 700; color: var(--km-muted); }
        .km-alan input, .km-alan select, .km-alan textarea {
            width: 100%; border: 1px solid var(--km-border); border-radius: 12px;
            background: var(--km-card); color: var(--km-text); padding: 10px 12px; font: inherit;
        }
        .km-alan textarea { min-height: 180px; resize: vertical; line-height: 1.45; }
        .km-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .km-grid--tek { grid-template-columns: 1fr; }
        .km-actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .km-actions .km-btn--danger { color: #b91c1c; border-color: #fecaca; }
        .km-not { font-size: 12px; color: var(--km-muted); line-height: 1.45; }
        @media (max-width: 640px) {
            .km-grid { grid-template-columns: 1fr; }
            .km-meta { width: 100%; margin-left: 0; }
        }
    </style>
    <script src="js/gunde5-shell.js"></script>
    <script defer src="js/gunde5-perf.js"></script>
    <script src="js/gunde5-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/gunde5-profil.js"></script>
    <script src="js/gunde5-ui.js"></script>
    <script src="js/gunde5-db.js?v=43"></script>
    <script src="js/gunde5-bildirim.js?v=3"></script>
    <script src="js/gunde5-master.js?v=2"></script>
    <script src="js/gunde5-kamikaze.js?v=4"></script>
    <link rel="stylesheet" href="css/gunde5-topbar.css?v=1">
    <link rel="stylesheet" href="css/master-panel.css?v=2">
</head>
<body class="master-panel-page">
    <header>
        <div class="header-sol">
            <div class="header-menu-wrap">
                <button type="button" class="header-menu-btn" id="headerMenuBtn" aria-label="Menü" aria-expanded="false" aria-controls="headerMenuPanel" onclick="Gunde5UI.toggleHeaderMenu(event)">
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                    <span class="header-menu-bar" aria-hidden="true"></span>
                </button>
                <div class="header-menu-panel" id="headerMenuPanel" hidden>
                    <nav class="header-menu-nav" aria-label="Site menüsü"></nav>
                </div>
            </div>
        </div>
        <a href="/" class="header-brand">gunde<span class="header-brand-red">5</span>.com</a>
        <div class="header-sag">
            <a href="/profil" class="header-profil-link" id="headerProfilLink" aria-label="Profilim">
                <span class="header-profil-avatar" id="headerProfilAvatar">♀</span>
            </a>
        </div>
    </header>

    <main class="km-page">
        <h1 class="km-title">☄️ Kamikaze</h1>
        <p class="km-intro">Hikayeleri ara, düzenle, planla. Gelen kutusundan onaylanan planlı hikayeler burada görünür. Arama: başlık, metin, rumuz veya ID.</p>

        <div id="kmYetkisiz" class="km-yetkisiz" hidden>
            <p id="kmYetkisizMetin"></p>
            <button type="button" class="km-btn km-btn--primary" id="kmGirisBtn" hidden style="margin-top:12px">Giriş yap</button>
        </div>

        <div id="kmAraclar" hidden>
            <div class="km-toolbar">
                <input type="search" id="kmAra" class="km-input" placeholder="Başlık, metin, rumuz veya ID…" autocomplete="off" aria-label="Hikaye ara">
                <select id="kmFiltre" class="km-select" aria-label="Durum filtresi">
                    <option value="hepsi">Tümü</option>
                    <option value="index">Yayında (index)</option>
                    <option value="planli">Planlı</option>
                    <option value="podyum">Podyum</option>
                    <option value="gizli">Gizli</option>
                    <option value="silinen">Silinen</option>
                </select>
                <button type="button" class="km-btn" id="kmYenile">Yenile</button>
                <button type="button" class="km-btn km-btn--primary" id="kmYeni">Yeni hikaye</button>
                <span class="km-meta" id="kmMeta">—</span>
            </div>
            <div id="kmListe" class="km-table-wrap"><p class="km-bos">Yükleniyor…</p></div>
        </div>
    </main>

    <div class="km-drawer" id="kmDrawer" hidden aria-hidden="true">
        <div class="km-drawer-bg" data-km-kapat></div>
        <div class="km-drawer-panel" role="dialog" aria-labelledby="kmDrawerBaslik">
            <div class="km-drawer-head">
                <h2 id="kmDrawerBaslik">Hikaye</h2>
                <button type="button" class="km-drawer-close" data-km-kapat aria-label="Kapat">×</button>
            </div>
            <div class="km-drawer-body" id="kmDrawerBody"></div>
        </div>
    </div>

    <script>
        function guncelleHeaderOturum() {
            if (window.Gunde5UI && Gunde5UI.guncelleHeaderOturum) Gunde5UI.guncelleHeaderOturum();
        }
    </script>
</body>
</html>
